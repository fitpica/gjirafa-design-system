<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gjirafa Design System v2.2</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23206ed5'/><text x='8' y='23' font-size='20' fill='white' font-family='system-ui' font-weight='700'>G</text></svg>"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>*{margin:0;box-sizing:border-box}html,body,#root{height:100%}</style>
</head><body><div id="root"></div>
<script type="text/babel">
const{useState,useRef,useCallback}=React;
function cx(...c){return c.filter(Boolean).join(" ")}

/* ═══ Icons ═══ */
const IC={
  search:()=><svg width="100%" height="100%" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="7" cy="7" r="4.5"/><line x1="10.2" y1="10.2" x2="14" y2="14"/></svg>,
  chevron:()=><svg width="100%" height="100%" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 4 10 8 6 12"/></svg>,
  mail:()=><svg width="100%" height="100%" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3.5" width="12" height="9" rx="1.5"/><polyline points="2 4.5 8 9 14 4.5"/></svg>,
  plus:()=><svg width="100%" height="100%" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>,
  download:()=><svg width="100%" height="100%" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 2v9M4.5 7.5L8 11l3.5-3.5M3 13h10"/></svg>,
  lock:()=><svg width="100%" height="100%" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3.5" y="7" width="9" height="7" rx="1.5"/><path d="M5.5 7V5a2.5 2.5 0 015 0v2"/></svg>,
  copy:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M2 11V3.5A1.5 1.5 0 013.5 2H11"/></svg>,
  check:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#34d399" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3.5 8.5 6.5 11.5 12.5 4.5"/></svg>,
  sun:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>,
  moon:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13.5 8.5a5.5 5.5 0 01-7.5-7.5 6 6 0 107.5 7.5z"/></svg>,
  figma:()=><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5.5 15A2.5 2.5 0 008 12.5v-2.5H5.5a2.5 2.5 0 000 5z" fill="#0ACF83"/><path d="M3 7.5A2.5 2.5 0 015.5 5H8v5H5.5A2.5 2.5 0 013 7.5z" fill="#A259FF"/><path d="M3 2.5A2.5 2.5 0 015.5 0H8v5H5.5A2.5 2.5 0 013 2.5z" fill="#F24E1E"/><path d="M8 0h2.5a2.5 2.5 0 010 5H8V0z" fill="#FF7262"/><path d="M13 7.5a2.5 2.5 0 01-2.5 2.5H8V5h2.5A2.5 2.5 0 0113 7.5z" fill="#1ABCFE"/></svg>,
};

/* ═══ Themes (v2.2 resolved) ═══ */
const TH={
  codex:{"--btn-pri-bg":"#206ed5","--btn-pri-bg-h":"#1d64c2","--btn-pri-bg-a":"#174e97","--btn-pri-tx":"#fff","--btn-pri-bd":"#206ed5","--btn-sec-bg":"#fff","--btn-sec-bg-h":"#F7F7F8","--btn-sec-bg-a":"#f1f1f3","--btn-sec-tx":"#1e1e36","--btn-sec-bd":"#dedee2","--btn-sec-bd-h":"#9595a0","--btn-sec-bd-a":"#206ed5","--btn-gho-bg":"transparent","--btn-gho-bg-h":"#F7F7F8","--btn-gho-bg-a":"#f1f1f3","--btn-gho-tx":"#206ed5","--btn-gho-tx-h":"#1d64c2","--btn-gho-bd":"transparent","--btn-cri-bg":"#d44f3c","--btn-cri-bg-h":"#a53e2f","--btn-cri-bg-a":"#803024","--btn-cri-tx":"#fff","--btn-cri-bd":"#d44f3c","--btn-pos-bg":"#1c8459","--btn-pos-bg-h":"#166746","--btn-pos-bg-a":"#115036","--btn-pos-tx":"#fff","--btn-pos-bd":"#1c8459","--btn-dis-bg":"#ebebed","--btn-dis-tx":"#b1b1b9","--btn-dis-bd":"#c0c0c7","--btn-foc-ring":"#206ed5","--btn-foc-off":"#fff","--btn-sh":"0 1px 2px 0 rgba(235,235,237,1)","--btn-sh-h":"0 2px 3px 0 rgba(222,222,226,1)","--inp-bg":"#fff","--inp-tx":"#1e1e36","--inp-ph":"#9595a0","--inp-bd":"#dedee2","--inp-bd-h":"#9595a0","--inp-bd-f":"#206ed5","--inp-lb":"#4b4b5f","--inp-hl":"#868693","--inp-err-bd":"#e95742","--inp-err-tx":"#a53e2f","--inp-wrn-bd":"#D97F11","--inp-wrn-tx":"#aa630d","--inp-dis-bg":"#ebebed","--inp-dis-tx":"#b1b1b9","--inp-dis-bd":"#c0c0c7","--inp-foc-ring":"#206ed5","--inp-foc-off":"#fff"},
  vpPlayer:{"--btn-pri-bg":"#ef8c13","--btn-pri-bg-h":"#D97F11","--btn-pri-bg-a":"#aa630d","--btn-pri-tx":"#fff","--btn-pri-bd":"#ef8c13","--btn-sec-bg":"#fff","--btn-sec-bg-h":"#F7F7F8","--btn-sec-bg-a":"#f1f1f3","--btn-sec-tx":"#1e1e36","--btn-sec-bd":"#dedee2","--btn-sec-bd-h":"#9595a0","--btn-sec-bd-a":"#ef8c13","--btn-gho-bg":"transparent","--btn-gho-bg-h":"#F7F7F8","--btn-gho-bg-a":"#f1f1f3","--btn-gho-tx":"#ef8c13","--btn-gho-tx-h":"#D97F11","--btn-gho-bd":"transparent","--btn-cri-bg":"#d44f3c","--btn-cri-bg-h":"#a53e2f","--btn-cri-bg-a":"#803024","--btn-cri-tx":"#fff","--btn-cri-bd":"#d44f3c","--btn-pos-bg":"#1c8459","--btn-pos-bg-h":"#166746","--btn-pos-bg-a":"#115036","--btn-pos-tx":"#fff","--btn-pos-bd":"#1c8459","--btn-dis-bg":"#ebebed","--btn-dis-tx":"#b1b1b9","--btn-dis-bd":"#c0c0c7","--btn-foc-ring":"#ef8c13","--btn-foc-off":"#fff","--btn-sh":"0 1px 2px 0 rgba(235,235,237,1)","--btn-sh-h":"0 2px 3px 0 rgba(222,222,226,1)","--inp-bg":"#fff","--inp-tx":"#1e1e36","--inp-ph":"#9595a0","--inp-bd":"#dedee2","--inp-bd-h":"#9595a0","--inp-bd-f":"#ef8c13","--inp-lb":"#4b4b5f","--inp-hl":"#868693","--inp-err-bd":"#e95742","--inp-err-tx":"#a53e2f","--inp-wrn-bd":"#D97F11","--inp-wrn-tx":"#aa630d","--inp-dis-bg":"#ebebed","--inp-dis-tx":"#b1b1b9","--inp-dis-bd":"#c0c0c7","--inp-foc-ring":"#ef8c13","--inp-foc-off":"#fff"},
};

/* ═══ Components ═══ */
function Button({variant="primary",size="medium",disabled=false,fullWidth=false,iconLeft,iconRight,children,className,...r}){
  return <button type="button" disabled={disabled} className={cx("gb","gb-"+variant,"gb-"+size,fullWidth&&"gb-fw",disabled&&"gb-d",className)} {...r}>{iconLeft&&<span className="gb_i">{iconLeft}</span>}{children&&<span className="gb_l">{children}</span>}{iconRight&&<span className="gb_i">{iconRight}</span>}</button>;
}
function Input({label,placeholder,size="medium",disabled=false,error,warning,helperText,required=false,iconLeft,iconRight,id,name,...r}){
  const iid=id||name,st=error?"error":warning?"warning":null,msg=error||warning||helperText,mid=msg&&iid?iid+"-m":undefined;
  return <div className={cx("gi","gi-"+size,st&&"gi-"+st,disabled&&"gi-d")}>{label&&<label className="gi_lb" htmlFor={iid}>{label}{required&&<span style={{color:"var(--inp-hl)"}}>*</span>}</label>}<div className={cx("gi_w",disabled&&"gi_w-d",st&&"gi_w-"+st)}>{iconLeft&&<span className="gi_ic">{iconLeft}</span>}<input className="gi_f" id={iid} name={name} placeholder={placeholder} disabled={disabled} aria-invalid={error?true:undefined} aria-describedby={mid} {...r}/>{iconRight&&<span className="gi_ic">{iconRight}</span>}</div>{msg&&<span className="gi_h" id={mid} role={error?"alert":undefined}>{msg}</span>}</div>;
}

/* ═══ Primitives ═══ */
function Pill({on,children,...p}){return <button className={cx("pl",on&&"pl-a")} {...p}>{children}</button>}
function Tag({children}){return <span className="tg">{children}</span>}
function CopyBtn({text}){const[ok,s]=useState(false);return <button className="cpb" onClick={()=>{navigator.clipboard?.writeText(text);s(true);setTimeout(()=>s(false),1800)}}>{ok?<IC.check/>:<IC.copy/>}{ok?"Copied":"Copy"}</button>}
function CodeBlock({code}){return <div className="cb"><div className="cb-bar"><CopyBtn text={code}/></div><pre className="cb-pre"><code>{code}</code></pre></div>}
function PreviewBox({code,children}){
  const[tab,setTab]=useState("preview");
  return <div className="pv"><div className="pv-bar"><div className="pv-tabs"><button className={cx("pv-t",tab==="preview"&&"pv-ta")} onClick={()=>setTab("preview")}>Preview</button><button className={cx("pv-t",tab==="code"&&"pv-ta")} onClick={()=>setTab("code")}>Code</button></div><CopyBtn text={code}/></div>{tab==="preview"?<div className="pv-stage">{children}</div>:<pre className="cb-pre" style={{borderRadius:0}}><code>{code}</code></pre>}</div>;
}
function Swatch({hex,name}){return <div className="sw"><span className="sw-c" style={{background:hex}}/><span className="sw-n">{name}</span><span className="sw-h">{hex}</span></div>}
function TokenRow({token,ref_,resolved}){return <div className="tr"><span className="tr-t">{token}</span><span className="tr-r">{ref_}</span><span className="tr-v">{resolved}</span></div>}

/* ═══ Color palette data ═══ */
const PALETTES={
  blue:[["50","#e9f1fb"],["75","#DDE9F9"],["100","#bad2f2"],["200","#98bcec"],["300","#6a9ee3"],["400","#4d8bdd"],["500","#206ed5"],["600","#1d64c2"],["700","#174e97"],["800","#123d75"],["900","#0d2e59"]],
  green:[["50","#e9f4ef"],["100","#baddce"],["300","#69b596"],["500","#1f9162"],["600","#1c8459"],["700","#166746"],["900","#0d3d29"]],
  orange:[["50","#FDF6EC"],["100","#fadbb6"],["300","#f4b261"],["500","#ef8c13"],["600","#D97F11"],["700","#aa630d"],["900","#643b08"]],
  red:[["50","#fdeeec"],["100","#f8cbc4"],["300","#f08e80"],["500","#e95742"],["600","#d44f3c"],["700","#a53e2f"],["900","#62251c"]],
  purple:[["50","#f4f2fc"],["100","#dbd6f7"],["300","#b2a7ed"],["500","#8c7be4"],["600","#7f70cf"],["700","#6357a2"],["900","#3b3460"]],
  neutral:[["0","#ffffff"],["20","#F7F7F8"],["25","#f1f1f3"],["30","#ebebed"],["40","#dedee2"],["50","#c0c0c7"],["60","#b1b1b9"],["80","#9595a0"],["90","#868693"],["100","#767685"],["400","#4b4b5f"],["700","#1e1e36"],["900","#02021d"]],
};

/* ═══ Nav ═══ */
const NAVS=[
  {g:"OVERVIEW",items:[{id:"tokens",l:"Design Tokens"}]},
  {g:"FOUNDATIONS",items:[{id:"colors",l:"Colors"},{id:"spacing",l:"Spacing"},{id:"typography",l:"Typography"},{id:"shadows",l:"Shadows"}]},
  {g:"ATOMS",items:[{id:"button",l:"Button",c:41},{id:"input",l:"Input",c:22}]},
];

/* ═══ App ═══ */
function App(){
  const[th,setTh]=useState("codex");const[dk,setDk]=useState(false);const[pg,setPg]=useState("tokens");
  const[bv,sBv]=useState("primary");const[bs,sBs]=useState("medium");
  const[iv,sIv]=useState("default");const[is2,sIs]=useState("medium");
  const p=th==="codex"?"#206ed5":"#ef8c13",nm=th==="codex"?"CODEX":"VP Player";
  const bg=dk?"#0d0d1a":"#fff",bg2=dk?"#161626":"#f5f5f7",tx=dk?"#e8e8ed":"#1e1e36",tx2=dk?"#9898a8":"#58586a",tx3=dk?"#5e5e72":"#9595a0",bdr=dk?"#222236":"#ebebed",bdr2=dk?"#2e2e42":"#dedee2",codeBg=dk?"#0a0a16":"#1a1a2e";

  const btnC="<Button variant=\""+bv+"\" size=\""+bs+"\">\n  Get started\n</Button>";
  const inpC=iv==="error"?"<Input label=\"Username\" error=\"Required\" />":iv==="warning"?"<Input label=\"Key\" warning=\"Test key\" />":iv==="disabled"?"<Input label=\"Org\" disabled />":"<Input label=\"Email\" placeholder=\"you@co.com\" />";
  function renderInp(){
    if(iv==="error") return <Input label="Username" name="pv" defaultValue="ab" error="Must be 3+ chars" size={is2}/>;
    if(iv==="warning") return <Input label="API key" name="pv" defaultValue="sk-test" warning="Test key" size={is2}/>;
    if(iv==="disabled") return <Input label="Organization" name="pv" placeholder="Auto" disabled size={is2}/>;
    if(iv==="filled") return <Input label="Email" name="pv" defaultValue="arlind@gjirafa.com" size={is2}/>;
    return <Input label="Email" name="pv" placeholder="you@company.com" helperText="We won't share it" size={is2}/>;
  }

  return <div style={{...TH[th],"--bg":bg,"--bg2":bg2,"--tx":tx,"--tx2":tx2,"--tx3":tx3,"--bdr":bdr,"--bdr2":bdr2,"--codeBg":codeBg}}>
  <style>{CSS}</style>
  <div className="ds">
    <aside className="si"><div className="si-top">
      <div className="si-brand"><div className="si-logo" style={{background:p}}>G</div><span className="si-name">Gjirafa DS</span><Tag>v2.2</Tag></div>
      {NAVS.map(g=><div key={g.g} className="nv-g"><div className="nv-gl">{g.g}</div>{g.items.map(i=><button key={i.id} className={cx("nv-i",pg===i.id&&"nv-a")} onClick={()=>setPg(i.id)}>{i.l}{i.c!=null&&<span className="nv-c">{i.c}</span>}</button>)}</div>)}
    </div></aside>

    <div className="mn-wrap">
      <header className="topbar">
        <div className="topbar-crumb">{pg==="button"||pg==="input"?"Atoms":"Foundations"} &rsaquo; <strong>{pg==="tokens"?"Design Tokens":pg==="colors"?"Colors":pg==="spacing"?"Spacing":pg==="typography"?"Typography":pg==="shadows"?"Shadows":pg==="button"?"Button":"Input"}</strong></div>
        <div className="topbar-r">
          <div style={{display:"flex",gap:3}}><Pill on={th==="codex"} onClick={()=>setTh("codex")}>CODEX</Pill><Pill on={th==="vpPlayer"} onClick={()=>setTh("vpPlayer")}>VP Player</Pill></div>
          <button className="topbar-btn" onClick={()=>setDk(!dk)}>{dk?<IC.sun/>:<IC.moon/>}{dk?" Light":" Dark"}</button>
          <a className="topbar-fig" href="https://www.figma.com/design/72WrhLiMKZBoAnrABjQZuh/Design-system-AI" target="_blank"><IC.figma/> Figma</a>
        </div>
      </header>

      <main className="mn">

{/* ═══ DESIGN TOKENS ═══ */}
{pg==="tokens"&&<div>
  <div className="ey">OVERVIEW</div><h1 className="h1">Design Tokens</h1>
  <p className="desc">Design tokens are the single source of truth for visual decisions across CODEX and VP Player. Three layers — foundation, semantic, component — each with one job.</p>
  <div className="dvd"/>
  <div className="sl">ARCHITECTURE</div>
  <div className="ar">{["Foundation","Semantic","Component"].map((n,i)=><div key={i} className="ar-s" style={i===2?{background:p+"0a",borderColor:p+"30"}:undefined}><div className="ar-n">{String(i+1).padStart(2,"0")}</div><div className="ar-m">{n}</div><div className="ar-d">{["Raw values","Meaning-based","Per-component"][i]}</div></div>)}</div>
  <div className="note"><strong>Resolution example ({nm}):</strong><br/><code>button.primary.bg → action.primary → {th==="codex"?"color.blue.500 → #206ed5":"color.orange.500 → #ef8c13"}</code></div>
  <div className="dvd"/>
  <div className="sl">FILE STRUCTURE</div>
  <div className="tbl"><div className="tbl-h"><span>File</span><span>Layer</span><span>Tokens</span></div>
    {[["foundation.tokens.json","Foundation","121"],["foundation.sizing.tokens.json","Foundation","28"],["foundation.typography.tokens.json","Foundation","18"],["foundation.shadow.tokens.json","Foundation","9"],["semantic.tokens.json","Semantic","87"],["codex.tokens.json","Theme","87"],["vpPlayer.tokens.json","Theme","87"],["button.tokens.json","Component","41"],["input.tokens.json","Component","22"]].map(([f,l,c],i)=><div key={i} className="tbl-r"><span className="mono">{f}</span><span>{l}</span><span>{c}</span></div>)}
  </div>
  <div className="dvd"/>
  <div className="sl">RULES</div>
  <div className="note"><strong>Do:</strong> Use semantic tokens in components. Reference <code>{"text.primary"}</code>, never <code>{"color.neutral.700"}</code>.<br/><strong>Don't:</strong> Skip the semantic layer. Direct foundation usage breaks theme switching.</div>
</div>}

{/* ═══ COLORS ═══ */}
{pg==="colors"&&<div>
  <div className="ey">FOUNDATIONS</div><h1 className="h1">Colors</h1>
  <p className="desc">9 chromatic palettes plus a neutral scale. Each has 11 steps (50–900). Every color in the product resolves back to this palette.</p>
  <div className="tg-row"><Tag>121 tokens</Tag><Tag>10 palettes</Tag><Tag>50–900 scale</Tag></div>
  <div className="dvd"/>
  {Object.entries(PALETTES).map(([name,steps])=><div key={name}>
    <div className="sl">{name.toUpperCase()}</div>
    <div className="pal">{steps.map(([step,hex])=><div key={step} className="pal-s"><span className="pal-c" style={{background:hex}}/><span className="pal-n">{step}</span><span className="pal-h">{hex}</span></div>)}</div>
    <div style={{height:20}}/>
  </div>)}
  <div className="dvd"/>
  <div className="sl">CODEX VS VP PLAYER</div>
  <div className="note">Both share the same foundation palette. Only 8 semantic tokens change — all brand-related. <code>action.primary</code> = <code>{th==="codex"?"blue.500":"orange.500"}</code> in {nm}.</div>
</div>}

{/* ═══ SPACING ═══ */}
{pg==="spacing"&&<div>
  <div className="ey">FOUNDATIONS</div><h1 className="h1">Spacing</h1>
  <p className="desc">Fixed spacing scale and border radius set used across all components and layouts.</p>
  <div className="tg-row"><Tag>14 space tokens</Tag><Tag>7 radius tokens</Tag><Tag>3 icon sizes</Tag></div>
  <div className="dvd"/>
  <div className="sl">SPACE SCALE</div>
  <div className="sp-grid">{[0,2,4,6,8,12,16,20,24,32,40,48,64,80].map(v=><div key={v} className="sp-item"><span className="sp-bar" style={{width:Math.min(v*2,280)}}/><span className="mono">{v}px</span></div>)}</div>
  <div className="dvd"/>
  <div className="sl">BORDER RADIUS</div>
  <div className="rad-grid">{[["none",0],["sm",2],["s",4],["m",6],["l",8],["xl",12],["pill",9999]].map(([n,v])=><div key={n} className="rad-item"><div className="rad-box" style={{borderRadius:Math.min(v,24)}}/><span className="mono">{n}</span><span className="sp-val">{v}px</span></div>)}</div>
  <div className="dvd"/>
  <div className="sl">ICON SIZES</div>
  <div className="pv"><div className="pv-stage" style={{gap:32}}>{[["small",16],["medium",20],["large",24]].map(([n,v])=><div key={n} style={{textAlign:"center"}}><div style={{width:v,height:v,background:tx3,borderRadius:4,margin:"0 auto 6px"}}/><span className="mono" style={{fontSize:11}}>{n} · {v}px</span></div>)}</div></div>
</div>}

{/* ═══ TYPOGRAPHY ═══ */}
{pg==="typography"&&<div>
  <div className="ey">FOUNDATIONS</div><h1 className="h1">Typography</h1>
  <p className="desc">Inter is the system typeface. 3 weights, 8 sizes, 3 line heights combine into 13 semantic typography tokens.</p>
  <div className="tg-row"><Tag>Inter</Tag><Tag>400 / 500 / 600</Tag><Tag>13 composites</Tag></div>
  <div className="dvd"/>
  <div className="sl">TYPE SCALE</div>
  <div className="type-list">
    {[["titleLarger",23,500,"Hero titles"],["titleLarge",20,500,"Page titles"],["titleBase",18,500,"Section titles"],["bodyHeadline",16,400,"Lead text"],["bodyBase",14,400,"Default body"],["bodySmall",12,400,"Compact body"],["bodySmaller",11,400,"Small labels"],["bodySmallest",10,400,"Fine print"]].map(([n,s,w,u])=><div key={n} className="type-row"><span style={{fontSize:s,fontWeight:w,lineHeight:s<14?"18px":s<17?"22px":"24px",color:"var(--tx)"}}>{n}</span><span className="mono" style={{fontSize:11,color:"var(--tx3)"}}>{s}px / {w}</span><span style={{fontSize:12,color:"var(--tx3)"}}>{u}</span></div>)}
  </div>
</div>}

{/* ═══ SHADOWS ═══ */}
{pg==="shadows"&&<div>
  <div className="ey">FOUNDATIONS</div><h1 className="h1">Shadows</h1>
  <p className="desc">9 composed box-shadow values. Single-string CSS values — no exploded x/y/blur properties.</p>
  <div className="tg-row"><Tag>9 shadows</Tag><Tag>Composed values</Tag></div>
